<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="100%" height="100%">
  <defs>
    <!-- Deep Drop Shadow -->
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="10" dy="20" stdDeviation="14" flood-color="#000000" flood-opacity="0.85" />
    </filter>

    <!-- Metallic Base Reflection for Ring & Spokes -->
    <linearGradient id="metalGrad" x1="10%" y1="10%" x2="90%" y2="90%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="20%" stop-color="#FFF2A8" /> <!-- Bright reflection -->
      <stop offset="35%" stop-color="#8B631C" /> <!-- Mid shadow -->
      <stop offset="50%" stop-color="#3D2600" /> <!-- Deep core shadow -->
      <stop offset="65%" stop-color="#FCE17A" /> <!-- Secondary bounce light -->
      <stop offset="85%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#4A2E00" />
    </linearGradient>

    <!-- Bright Edge Highlight (for Beveling) -->
    <linearGradient id="highlightGrad" x1="0%" y1="0%" x2="100%" y2="100%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9" />
      <stop offset="50%" stop-color="#FCE17A" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.8" />
    </linearGradient>

    <!-- 3D Sphere Shading -->
    <radialGradient id="sphereGrad" cx="32%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="12%" stop-color="#FCE17A" />
      <stop offset="35%" stop-color="#C29221" />
      <stop offset="65%" stop-color="#6B4A08" />
      <stop offset="88%" stop-color="#2E1F02" />
      <stop offset="100%" stop-color="#140C00" />
    </radialGradient>

    <!-- Pure Optical Glare for Spheres -->
    <radialGradient id="glareGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </radialGradient>

    <!-- Core Geometry Structure (Reused for perfect layered bevels) -->
    <g id="spokes-and-ring">
      <line x1="500" y1="500" x2="500" y2="110" />
      <line x1="500" y1="500" x2="775.77" y2="224.23" />
      <line x1="500" y1="500" x2="890" y2="500" />
      <line x1="500" y1="500" x2="775.77" y2="775.77" />
      <line x1="500" y1="500" x2="500" y2="890" />
      <line x1="500" y1="500" x2="224.23" y2="775.77" />
      <line x1="500" y1="500" x2="110" y2="500" />
      <line x1="500" y1="500" x2="224.23" y2="224.23" />
      <circle cx="500" cy="500" r="230" fill="none" />
    </g>

    <!-- Master Orb Definition (Sphere + Glare) -->
    <g id="orb">
      <circle cx="0" cy="0" r="75" fill="url(#sphereGrad)" />
      <!-- Specular Highlight Pointing to Global Light Source -->
      <ellipse cx="-28" cy="-28" rx="24" ry="14" transform="rotate(-40 -28 -28)" fill="url(#glareGrad)" />
    </g>
  </defs>

  <!-- Entire Wheel Grouped for Single Unified Shadow -->
  <g filter="url(#drop-shadow)">
    
    <!-- 1. Deep Shadow Outline (The Base Structure) -->
    <use href="#spokes-and-ring" stroke="#211500" stroke-width="40" stroke-linecap="round" />
    
    <!-- 2. Main Metallic Geometry -->
    <use href="#spokes-and-ring" stroke="url(#metalGrad)" stroke-width="32" stroke-linecap="round" />
    
    <!-- 3. Inner Dark Core (Simulates bottom-right inset shadow) -->
    <use href="#spokes-and-ring" stroke="#1A1100" stroke-width="10" stroke-linecap="round" opacity="0.6" transform="translate(4, 4)" />
    
    <!-- 4. Bright Top-Left Edge Highlight (Simulates top-left bevel) -->
    <use href="#spokes-and-ring" stroke="url(#highlightGrad)" stroke-width="7" stroke-linecap="round" transform="translate(-3, -3)" />

    <!-- 5. Placement of the 8 Outer Orbs -->
    <use href="#orb" x="500" y="110" />
    <use href="#orb" x="775.77" y="224.23" />
    <use href="#orb" x="890" y="500" />
    <use href="#orb" x="775.77" y="775.77" />
    <use href="#orb" x="500" y="890" />
    <use href="#orb" x="224.23" y="775.77" />
    <use href="#orb" x="110" y="500" />
    <use href="#orb" x="224.23" y="224.23" />

    <!-- 6. Center Hub Structure (Dual layered for extra dimension) -->
    <!-- Large base dome -->
    <circle cx="500" cy="500" r="105" fill="url(#sphereGrad)" />
    <!-- Center top button/sphere -->
    <circle cx="500" cy="500" r="68" fill="url(#sphereGrad)" />
    
    <!-- Optical glares for the center hubs -->
    <ellipse cx="460" cy="460" rx="32" ry="18" transform="rotate(-40 460 460)" fill="url(#glareGrad)" />
    <ellipse cx="478" cy="478" rx="16" ry="10" transform="rotate(-40 478 478)" fill="url(#glareGrad)" />

  </g>
</svg>